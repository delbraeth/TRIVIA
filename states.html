// ── APP LOGIC ────────────────────────────────────────────────────────────────
let currentFilter = 'all';

function setFilter(region) {
  currentFilter = region;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.r === region);
  });
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const grid = document.getElementById('grid');

  const results = DATA.filter(d => {
    const matchRegion = currentFilter === 'all' || d.region === currentFilter;
    const matchSearch = !q
      || d.name.toLowerCase().includes(q)
      || d.capital.toLowerCase().includes(q)
      || d.nickname.toLowerCase().includes(q)
      || d.bird.toLowerCase().includes(q)
      || d.trivia.toLowerCase().includes(q)
      || d.year.includes(q);
    return matchRegion && matchSearch;
  });

  document.getElementById('badge').textContent =
    results.length + (results.length === 1 ? ' entry' : ' entries');

  if (results.length === 0) {
    grid.innerHTML = '<div class="no-results">😢 No results found — try a different search!</div>';
    return;
  }

  grid.innerHTML = results.map(d => {
    const c = COLORS[d.region];
    // Slightly darken the color for gradient
    return `
      <div class="card">
        <div class="card-header" style="background:linear-gradient(135deg,${c}ee,${c}bb);">
          <div class="region-tag">${REGION_LABEL[d.region]}</div>
          <div class="card-name">${d.name}</div>
          <div class="year-badge">${d.year}</div>
        </div>
        <div class="card-body">
          <div class="info-row">
            <span class="info-icon">🏛️</span>
            <span class="info-label">Capital</span>
            <span class="info-val">${d.capital}</span>
          </div>
          <div class="info-row">
            <span class="info-icon">⭐</span>
            <span class="info-label">Nickname</span>
            <span class="info-val">${d.nickname}</span>
          </div>
          <div class="info-row">
            <span class="info-icon">🐦</span>
            <span class="info-label">State Bird</span>
            <span class="info-val">${d.bird}</span>
          </div>
          <div class="info-row">
            <span class="info-icon">📅</span>
            <span class="info-label">${d.yearLabel}</span>
            <span class="info-val">${d.year}</span>
          </div>
        </div>
        <div class="trivia">
          <div class="trivia-label">💡 Did You Know?</div>
          <div class="trivia-text">${d.trivia}</div>
        </div>
      </div>`;
  }).join('');
}

render();
</script>
